<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Multi-Agent Orchestrator · Live Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    --bg-0:#05060d;
    --bg-1:#0a0d1f;
    --neon-cyan:#00e5ff;
    --neon-violet:#8b5cf6;
    --neon-pink:#ff3dad;
    --neon-green:#22ffb3;
    --neon-amber:#ffb547;
    --glass: rgba(255,255,255,0.04);
    --glass-strong: rgba(255,255,255,0.07);
    --stroke: rgba(255,255,255,0.10);
    --text-0:#e7eaf3;
    --text-1:#a3a9bd;
    --text-2:#6b7390;
  }
  html, body { width:100%; height:100%; overflow:hidden; background: var(--bg-0); color: var(--text-0); font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif; }
  body{
    background:
      radial-gradient(1200px 600px at 70% -10%, rgba(139,92,246,0.18), transparent 60%),
      radial-gradient(900px 500px at 10% 110%, rgba(0,229,255,0.14), transparent 60%),
      linear-gradient(180deg, #05060d 0%, #07091a 100%);
  }

  /* 3D canvas */
  #scene-canvas{
    position: fixed; inset:0; z-index: 0;
    width:100%; height:100%;
    display:block;
  }

  /* Vignette + grain */
  .vignette{
    position: fixed; inset:0; pointer-events:none; z-index:1;
    background:
      radial-gradient(circle at 50% 50%, transparent 50%, rgba(0,0,0,0.55) 100%);
  }

  /* App shell */
  .app{
    position: relative; z-index: 2;
    display: grid;
    grid-template-columns: 320px 1fr 400px;
    grid-template-rows: 64px 1fr auto;
    grid-template-areas:
      "header header header"
      "left   center  right"
      "left   input   right";
    height: 100vh;
    gap: 18px;
    padding: 18px;
  }

  /* Header */
  header{
    grid-area: header;
    display:flex; align-items:center; justify-content:space-between;
    padding: 0 20px;
    background: var(--glass);
    border: 1px solid var(--stroke);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border-radius: 16px;
  }
  .logo{
    display:flex; align-items:center; gap:12px;
    font-weight:600; letter-spacing:0.4px;
  }
  .logo-mark{
    width:28px; height:28px; border-radius:8px;
    background: conic-gradient(from 200deg, var(--neon-cyan), var(--neon-violet), var(--neon-pink), var(--neon-cyan));
    box-shadow: 0 0 24px rgba(139,92,246,0.55), inset 0 0 12px rgba(255,255,255,0.2);
    animation: spin 6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .logo small{ display:block; color:var(--text-2); font-size:11px; font-weight:400; letter-spacing:1.2px; text-transform: uppercase; }
  .header-actions{ display:flex; gap:10px; align-items:center; }
  .pill{
    padding: 8px 14px; border-radius: 999px;
    background: var(--glass-strong); border: 1px solid var(--stroke);
    color: var(--text-1); font-size: 12px; cursor: pointer; transition: all 0.2s;
    display:inline-flex; align-items:center; gap:8px;
    font-family: 'JetBrains Mono', monospace;
  }
  .pill:hover{ color:var(--text-0); border-color: rgba(255,255,255,0.25); transform: translateY(-1px); }
  .pill .dot{ width:8px; height:8px; border-radius:50%; background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
  .pill .dot.warn{ background: var(--neon-amber); box-shadow: 0 0 10px var(--neon-amber); }
  .pill .dot.bad{ background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

  /* Panels */
  .panel{
    background: var(--glass);
    border: 1px solid var(--stroke);
    border-radius: 18px;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    padding: 18px;
    display:flex; flex-direction: column;
    overflow:hidden;
  }
  .panel h3{
    font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase;
    color: var(--text-2); font-weight: 500; margin-bottom: 14px;
    display:flex; align-items:center; gap:8px;
  }
  .panel h3::before{
    content:""; width:6px; height:6px; border-radius:50%;
    background: var(--neon-violet); box-shadow: 0 0 10px var(--neon-violet);
  }

  /* Left panel: agents */
  .left-panel{ grid-area: left; }
  .agent-list{ display:flex; flex-direction: column; gap:10px; overflow-y:auto; }
  .agent-card{
    position: relative;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid var(--stroke);
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
  }
  .agent-card::before{
    content:""; position: absolute; inset:0;
    background: radial-gradient(120px 80px at 100% 0%, var(--c), transparent 70%);
    opacity: 0; transition: opacity 0.3s;
  }
  .agent-card.active{ border-color: rgba(255,255,255,0.25); transform: translateX(4px); }
  .agent-card.active::before{ opacity: 0.35; }
  .agent-card.done{ border-color: rgba(34,255,179,0.35); }
  .agent-head{ display:flex; align-items:center; gap:10px; }
  .agent-icon{
    width:32px; height:32px; border-radius:10px;
    display:grid; place-items:center;
    background: rgba(255,255,255,0.04); border:1px solid var(--stroke);
    color:var(--c); font-weight:700; font-size:14px;
    box-shadow: 0 0 0 0 var(--c);
    transition: box-shadow 0.4s;
  }
  .agent-card.active .agent-icon{
    box-shadow: 0 0 22px rgba(255,255,255,0.05), 0 0 18px var(--c);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 18px var(--c); }
    50%      { box-shadow: 0 0 32px var(--c); }
  }
  .agent-meta{ flex:1; }
  .agent-name{ font-size: 13px; font-weight: 600; letter-spacing:0.2px; }
  .agent-role{ font-size: 11px; color: var(--text-2); margin-top: 2px; }
  .agent-status{
    margin-top: 10px; font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-2); min-height: 14px;
  }
  .agent-bar{
    margin-top:10px; height:3px; border-radius:2px;
    background: rgba(255,255,255,0.06); overflow:hidden; position: relative;
  }
  .agent-bar::after{
    content:""; position:absolute; inset:0; width:0%;
    background: linear-gradient(90deg, transparent, var(--c), transparent);
    transition: width 0.6s;
  }
  .agent-card.active .agent-bar::after{
    width: 100%;
    animation: sweep 1.6s linear infinite;
  }
  @keyframes sweep {
    0%{ transform: translateX(-100%); } 100%{ transform: translateX(100%); }
  }
  .agent-card.done .agent-bar::after{ width: 100%; }

  /* Center panel */
  .center-panel{
    grid-area: center;
    position:relative;
    background: transparent;
    border: 1px solid transparent;
    padding: 0;
    display:flex; align-items:flex-start; justify-content:center;
  }
  .center-overlay{
    position:absolute; left:24px; top:24px; right:24px; bottom:24px;
    pointer-events:none;
    display:flex; flex-direction: column; justify-content:space-between;
  }
  .hero{
    pointer-events:none;
    text-align:center;
    margin-top: 12px;
    font-weight:300; letter-spacing: 1px;
  }
  .hero h1{
    font-size: 30px; font-weight:300;
    background: linear-gradient(90deg, #fff, #c3b9ff 60%, #74e8ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero p{
    color: var(--text-2); margin-top: 6px; font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }
  .reasoning-feed{
    pointer-events:auto;
    max-height: 220px;
    overflow-y: auto;
    align-self: stretch;
    margin: 0 auto; width: 100%; max-width: 720px;
    padding: 14px 16px;
    background: rgba(8,10,22,0.55);
    border: 1px solid var(--stroke);
    border-radius: 14px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.7;
    color: var(--text-1);
  }
  .reasoning-feed::-webkit-scrollbar{ width: 6px; }
  .reasoning-feed::-webkit-scrollbar-thumb{ background: rgba(255,255,255,0.1); border-radius: 3px; }
  .reasoning-feed .row{ display:flex; gap:10px; margin-bottom: 6px; }
  .reasoning-feed .tag{
    flex-shrink:0; padding: 1px 8px; border-radius: 4px;
    font-size: 10px; color: var(--bg-0); font-weight:700; letter-spacing: 0.8px;
  }

  /* Input bar */
  .input-row{
    grid-area: input;
    display:flex; gap:12px; align-items:center;
    padding: 14px;
    background: var(--glass);
    border: 1px solid var(--stroke);
    border-radius: 18px;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
  }
  .input-row input{
    flex: 1; background: transparent; border: 0; outline: 0;
    color: var(--text-0); font-size: 15px; padding: 8px 6px;
    font-family: 'Space Grotesk', sans-serif;
  }
  .input-row input::placeholder{ color: var(--text-2); }
  .send-btn{
    border: 0; cursor: pointer;
    padding: 12px 22px; border-radius: 12px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-violet) 50%, var(--neon-pink));
    color:#0a0d1f; font-weight:700; letter-spacing:0.4px;
    box-shadow: 0 8px 30px rgba(139,92,246,0.35);
    transition: transform 0.15s, box-shadow 0.25s;
    display:inline-flex; align-items:center; gap:8px;
  }
  .send-btn:hover{ transform: translateY(-1px); box-shadow: 0 12px 36px rgba(139,92,246,0.55); }
  .send-btn:active{ transform: translateY(1px); }
  .send-btn:disabled{ opacity: 0.55; cursor:not-allowed; transform:none; }

  /* Right panel */
  .right-panel{ grid-area: right; }
  .stat-grid{
    display:grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 16px;
  }
  .stat{
    padding: 12px; border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--stroke);
  }
  .stat-label{ font-size: 10px; color: var(--text-2); letter-spacing: 1px; text-transform: uppercase; }
  .stat-value{ font-size: 20px; font-weight: 600; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .stat-value.green{ color: var(--neon-green); text-shadow: 0 0 14px rgba(34,255,179,0.4); }
  .stat-value.cyan{ color: var(--neon-cyan); text-shadow: 0 0 14px rgba(0,229,255,0.4); }
  .answer-card{
    flex:1; overflow-y:auto;
    padding: 14px; border-radius: 12px;
    background: linear-gradient(180deg, rgba(0,229,255,0.03), rgba(139,92,246,0.03));
    border: 1px solid var(--stroke);
    font-size: 14px; line-height: 1.6;
    min-height: 180px;
    position: relative;
  }
  .answer-card::-webkit-scrollbar{ width: 6px; }
  .answer-card::-webkit-scrollbar-thumb{ background: rgba(255,255,255,0.1); border-radius: 3px; }
  .answer-card.empty{
    display:flex; align-items:center; justify-content:center;
    color: var(--text-2); font-style: italic; font-size: 13px;
  }
  .cursor{ display:inline-block; width:8px; height:14px; vertical-align:middle; background:var(--neon-cyan); margin-left:2px; box-shadow:0 0 12px var(--neon-cyan); animation: blink 0.9s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* Eval modal */
  .modal-bg{
    position:fixed; inset:0; z-index: 50;
    background: rgba(5,6,13,0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display:none; align-items:center; justify-content:center;
  }
  .modal-bg.show{ display:flex; }
  .modal{
    width: min(720px, 92vw); max-height: 80vh; overflow-y:auto;
    background: linear-gradient(180deg, #0d1126, #07091a);
    border: 1px solid var(--stroke);
    border-radius: 22px;
    padding: 26px;
    box-shadow: 0 30px 90px rgba(0,0,0,0.6), 0 0 0 1px rgba(139,92,246,0.15);
  }
  .modal h2{ font-weight:500; margin-bottom: 8px; }
  .modal .sub{ font-size: 12px; color: var(--text-2); margin-bottom: 22px; font-family: 'JetBrains Mono', monospace; }
  .score-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 12px; }
  .score-card{
    padding: 14px; border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--stroke);
  }
  .score-card .lbl{ font-size: 11px; color: var(--text-2); letter-spacing: 0.5px; text-transform: capitalize; }
  .score-card .val{ font-size: 22px; font-weight:600; font-family: 'JetBrains Mono', monospace; margin-top:4px; }
  .modal .row { display:flex; gap:10px; justify-content:flex-end; margin-top:22px; }
  .modal .row .pill{ font-size: 13px; padding: 10px 16px; }
  .overall{
    display:flex; align-items:center; gap:18px; margin-bottom: 20px;
    padding: 16px; border-radius: 14px;
    background: linear-gradient(135deg, rgba(0,229,255,0.08), rgba(139,92,246,0.08));
    border: 1px solid var(--stroke);
  }
  .ring{
    width:80px; height:80px; border-radius:50%;
    background:
      radial-gradient(closest-side, #0d1126 0 64%, transparent 65% 100%),
      conic-gradient(from 0deg, var(--neon-cyan) 0%, var(--neon-violet) var(--p,50%), rgba(255,255,255,0.05) var(--p,50%) 100%);
    display:grid; place-items:center;
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
  }

  /* Toast */
  .toast{
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(60px);
    padding: 12px 18px; border-radius: 12px;
    background: rgba(13,17,38,0.95);
    border: 1px solid var(--stroke);
    color: var(--text-0); font-size: 13px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.45);
    transition: transform 0.3s, opacity 0.3s; opacity: 0;
    z-index: 60;
  }
  .toast.show{ transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Responsive */
  @media (max-width: 1180px){
    .app{ grid-template-columns: 280px 1fr; grid-template-areas:
      "header header"
      "left   center"
      "left   input"
      "right  right"; }
    .right-panel{ max-height: 220px; }
  }
  @media (max-width: 760px){
    .app{ grid-template-columns: 1fr; grid-template-areas:
      "header"
      "center"
      "input"
      "left"
      "right"; padding: 10px; gap: 10px; }
    .left-panel{ max-height: 240px; }
    .hero h1{ font-size: 22px; }
  }
</style>
</head>
<body>

<canvas id="scene-canvas"></canvas>
<div class="vignette"></div>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-mark"></div>
      <div>
        Multi-Agent Orchestrator
        <small>real-time · LLM · evaluation</small>
      </div>
    </div>
    <div class="header-actions">
      <span class="pill" id="health-pill"><span class="dot bad" id="health-dot"></span><span id="health-text">checking…</span></span>
      <button class="pill" id="evals-btn">⚡ Latest Evals</button>
      <button class="pill" id="reeval-btn">↻ Run Eval Suite</button>
    </div>
  </header>

  <section class="panel left-panel">
    <h3>Agents</h3>
    <div class="agent-list" id="agent-list"></div>
  </section>

  <section class="center-panel">
    <div class="center-overlay">
      <div class="hero">
        <h1>Ask anything. Watch the agents think.</h1>
        <p>orchestrator → decomposition → rag → critique → synthesis</p>
      </div>
      <div class="reasoning-feed" id="feed">
        <div class="row"><span style="color: var(--text-2);">[idle]</span><span>Awaiting your query…</span></div>
      </div>
    </div>
  </section>

  <form class="input-row" id="form">
    <input id="prompt" autocomplete="off" placeholder="Ask the agents anything — e.g., Explain quantum tunneling like I'm 12" />
    <button type="submit" class="send-btn" id="send"><span>Send</span> →</button>
  </form>

  <section class="panel right-panel">
    <h3>Live Output</h3>
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">Status</div><div class="stat-value cyan" id="stat-status">idle</div></div>
      <div class="stat"><div class="stat-label">Budget Left</div><div class="stat-value green" id="stat-budget">—</div></div>
    </div>
    <div class="answer-card empty" id="answer">Final synthesized answer will appear here.</div>
  </section>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ===== AGENTS DATA =====
const AGENTS = [
  { id:'orchestrator',  name:'Orchestrator', icon:'O', role:'Routes the request between specialists', color: '#8b5cf6' },
  { id:'decomposition', name:'Decomposition',icon:'D', role:'Breaks the query into a task graph',     color: '#00e5ff' },
  { id:'rag',           name:'RAG',          icon:'R', role:'Retrieves & reasons over evidence',     color: '#22ffb3' },
  { id:'critique',      name:'Critique',     icon:'C', role:'Audits claims, flags weak logic',       color: '#ffb547' },
  { id:'synthesis',     name:'Synthesis',    icon:'S', role:'Merges findings into the final answer', color: '#ff3dad' },
];
const AGENT_BY_ID = Object.fromEntries(AGENTS.map(a => [a.id, a]));

// ===== AGENT LIST DOM =====
const listEl = document.getElementById('agent-list');
AGENTS.forEach(a => {
  const card = document.createElement('div');
  card.className = 'agent-card';
  card.dataset.agent = a.id;
  card.style.setProperty('--c', a.color);
  card.innerHTML = `
    <div class="agent-head">
      <div class="agent-icon">${a.icon}</div>
      <div class="agent-meta">
        <div class="agent-name">${a.name}</div>
        <div class="agent-role">${a.role}</div>
      </div>
    </div>
    <div class="agent-status" data-status>idle</div>
    <div class="agent-bar"></div>
  `;
  listEl.appendChild(card);
});

// ===== THREE.JS SCENE =====
const canvas = document.getElementById('scene-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(48, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 0, 14);

scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const keyLight = new THREE.PointLight(0x8b5cf6, 1.8, 60);
keyLight.position.set(8, 8, 10);
scene.add(keyLight);
const rimLight = new THREE.PointLight(0x00e5ff, 1.4, 60);
rimLight.position.set(-10, -6, 8);
scene.add(rimLight);

// Starfield (background)
function makeStars(count, radius, size, color){
  const geom = new THREE.BufferGeometry();
  const positions = new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const r = radius*(0.55 + 0.45*Math.random());
    const t = Math.acos(2*Math.random()-1);
    const p = 2*Math.PI*Math.random();
    positions[i*3]   = r*Math.sin(t)*Math.cos(p);
    positions[i*3+1] = r*Math.sin(t)*Math.sin(p);
    positions[i*3+2] = r*Math.cos(t);
  }
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color, size, transparent:true, opacity:0.85, depthWrite:false, blending: THREE.AdditiveBlending });
  return new THREE.Points(geom, mat);
}
const starsA = makeStars(900, 60, 0.06, 0xaab7ff);
const starsB = makeStars(400, 30, 0.10, 0x8b5cf6);
scene.add(starsA, starsB);

// Orchestrator core (icosahedron with wireframe overlay)
const coreGroup = new THREE.Group();
scene.add(coreGroup);

const coreGeo = new THREE.IcosahedronGeometry(1.6, 1);
const coreMat = new THREE.MeshStandardMaterial({
  color: 0x1a1d3a, metalness: 0.5, roughness: 0.25,
  emissive: 0x6a45d6, emissiveIntensity: 0.6,
  flatShading: true,
});
const core = new THREE.Mesh(coreGeo, coreMat);
coreGroup.add(core);

const wireGeo = new THREE.IcosahedronGeometry(1.72, 2);
const wireMat = new THREE.MeshBasicMaterial({ color: 0x9b7dff, wireframe:true, transparent:true, opacity:0.45 });
const wire = new THREE.Mesh(wireGeo, wireMat);
coreGroup.add(wire);

const haloGeo = new THREE.RingGeometry(2.1, 2.25, 96);
const haloMat = new THREE.MeshBasicMaterial({ color: 0x8b5cf6, side: THREE.DoubleSide, transparent:true, opacity:0.35 });
const halo = new THREE.Mesh(haloGeo, haloMat);
halo.rotation.x = Math.PI / 2.4;
coreGroup.add(halo);

// Satellite agent orbs (4 around the core: decomposition, rag, critique, synthesis)
const SATS = AGENTS.filter(a => a.id !== 'orchestrator');
const satellites = [];
SATS.forEach((a, i) => {
  const grp = new THREE.Group();
  const angle = (i / SATS.length) * Math.PI * 2;
  const radius = 5.2;
  grp.userData = { angle, radius, baseY: (Math.sin(i*1.3)*0.6), id:a.id, color: new THREE.Color(a.color), active:false, t:0 };

  const orbGeo = new THREE.SphereGeometry(0.55, 32, 32);
  const orbMat = new THREE.MeshStandardMaterial({
    color: 0x0a0d1f, metalness:0.4, roughness:0.3,
    emissive: new THREE.Color(a.color), emissiveIntensity: 0.55
  });
  const orb = new THREE.Mesh(orbGeo, orbMat);
  grp.add(orb);

  const glowGeo = new THREE.SphereGeometry(0.85, 24, 24);
  const glowMat = new THREE.MeshBasicMaterial({ color: a.color, transparent:true, opacity:0.18, blending: THREE.AdditiveBlending });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  grp.add(glow);

  scene.add(grp);
  grp.userData.orb = orb;
  grp.userData.glow = glow;
  satellites.push(grp);
});

// Lines from each satellite back to the core
const lineMats = {};
const lines = {};
satellites.forEach(s => {
  const m = new THREE.LineBasicMaterial({
    color: s.userData.color, transparent: true, opacity: 0.18, blending: THREE.AdditiveBlending
  });
  const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
  const line = new THREE.Line(geo, m);
  scene.add(line);
  lineMats[s.userData.id] = m;
  lines[s.userData.id] = line;
});

// Mouse parallax
let mouseX = 0, mouseY = 0;
window.addEventListener('pointermove', e => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const clock = new THREE.Clock();
function setSatelliteActive(id, on){
  const s = satellites.find(x => x.userData.id === id);
  if (!s) return;
  s.userData.active = !!on;
}

function animate(){
  const dt = clock.getDelta();
  const t = clock.elapsedTime;

  // Camera subtle parallax
  camera.position.x += (mouseX * 1.2 - camera.position.x) * 0.04;
  camera.position.y += (-mouseY * 0.8 - camera.position.y) * 0.04;
  camera.lookAt(0,0,0);

  // Core rotation
  coreGroup.rotation.y += dt * 0.25;
  coreGroup.rotation.x += dt * 0.10;
  wire.rotation.y -= dt * 0.4;
  halo.rotation.z += dt * 0.6;
  const corePulse = 1 + Math.sin(t*1.6)*0.04;
  coreGroup.scale.setScalar(corePulse);

  // Stars
  starsA.rotation.y += dt * 0.01;
  starsB.rotation.y -= dt * 0.02;

  // Satellites orbiting
  satellites.forEach((s, i) => {
    const u = s.userData;
    u.angle += dt * (0.18 + i*0.02);
    const x = Math.cos(u.angle) * u.radius;
    const z = Math.sin(u.angle) * u.radius;
    const y = u.baseY + Math.sin(t*0.8 + i)*0.5;
    s.position.set(x, y, z);

    const targetT = u.active ? 1 : 0;
    u.t += (targetT - u.t) * Math.min(1, dt*4);

    const baseEmissive = 0.55;
    u.orb.material.emissiveIntensity = baseEmissive + u.t * 2.2 + Math.sin(t*4 + i)*0.05*u.t;
    u.glow.scale.setScalar(1 + u.t * 1.4 + Math.sin(t*3 + i)*0.06*u.t);
    u.glow.material.opacity = 0.18 + u.t * 0.35;

    // Update line endpoints
    const line = lines[u.id];
    const pts = line.geometry.attributes.position.array;
    pts[0]=x; pts[1]=y; pts[2]=z;
    pts[3]=0; pts[4]=0; pts[5]=0;
    line.geometry.attributes.position.needsUpdate = true;
    lineMats[u.id].opacity = 0.15 + u.t * 0.55 + Math.sin(t*6 + i)*0.06*u.t;
  });

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

// ===== UI helpers =====
const feed = document.getElementById('feed');
const statStatus = document.getElementById('stat-status');
const statBudget = document.getElementById('stat-budget');
const answerEl = document.getElementById('answer');
const sendBtn = document.getElementById('send');
const promptEl = document.getElementById('prompt');
const toastEl = document.getElementById('toast');
const healthDot = document.getElementById('health-dot');
const healthText = document.getElementById('health-text');

function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toastEl.classList.remove('show'), 3000);
}

function setAgentState(id, state, statusText){
  const card = listEl.querySelector(`[data-agent="${id}"]`);
  if (!card) return;
  card.classList.remove('active','done');
  if (state === 'active') card.classList.add('active');
  if (state === 'done')   card.classList.add('done');
  if (statusText !== undefined){
    card.querySelector('[data-status]').textContent = statusText;
  }
  setSatelliteActive(id, state === 'active');
}

function resetAgents(){
  AGENTS.forEach(a => setAgentState(a.id, 'idle', 'idle'));
}

function addFeedRow(agentId, text){
  const a = AGENT_BY_ID[agentId] || { color:'#a3a9bd', name: agentId || 'system' };
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `
    <span class="tag" style="background:${a.color}">${(a.name || agentId).toUpperCase()}</span>
    <span>${text}</span>
  `;
  feed.appendChild(row);
  feed.scrollTop = feed.scrollHeight;
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== Health check =====
async function checkHealth(){
  try{
    const r = await fetch('/health'); const j = await r.json();
    if (j.status === 'healthy'){
      healthDot.classList.remove('bad','warn'); healthDot.classList.add('dot');
      healthDot.style.background = 'var(--neon-green)';
      healthDot.style.boxShadow = '0 0 10px var(--neon-green)';
      healthText.textContent = 'API online';
    }
  } catch(e){
    healthDot.style.background = 'var(--neon-pink)';
    healthText.textContent = 'API offline';
  }
}
checkHealth();
setInterval(checkHealth, 15000);

// ===== Send query (SSE) =====
let currentJobId = null;
let isStreaming = false;

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const q = promptEl.value.trim();
  if (!q || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  resetAgents();
  feed.innerHTML = '';
  addFeedRow('orchestrator', `Received query: <em>${escapeHtml(q)}</em>`);
  statStatus.textContent = 'thinking';
  statBudget.textContent = '—';
  answerEl.classList.remove('empty');
  answerEl.innerHTML = '<span class="cursor"></span>';
  let answerText = '';

  try{
    const res = await fetch('/api/v1/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q }),
    });
    if (!res.ok || !res.body){
      throw new Error('Request failed: '+res.status);
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let activeAgent = null;
    setAgentState('orchestrator', 'active', 'routing');

    while (true){
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream:true });
      let parts = buffer.split('\n\n');
      buffer = parts.pop() || '';
      for (const block of parts){
        const lines = block.split('\n').filter(l => l.startsWith('data: '));
        for (const line of lines){
          const payload = line.slice(6).trim();
          if (!payload) continue;
          let evt; try { evt = JSON.parse(payload); } catch { continue; }
          handleEvent(evt);
        }
      }
    }

    setAgentState('orchestrator', 'done', 'done');
    statStatus.textContent = 'complete';
    if (answerText.trim().length === 0){
      answerEl.innerHTML = '<em style="color:var(--text-2)">No final answer was emitted. Check the reasoning feed for routing details.</em>';
    } else {
      // Remove cursor
      answerEl.innerHTML = escapeHtml(answerText);
    }
  } catch(err){
    toast('Error: '+ err.message);
    statStatus.textContent = 'error';
  } finally{
    isStreaming = false;
    sendBtn.disabled = false;
  }

  function handleEvent(evt){
    if (evt.type === 'agent_activity'){
      const id = evt.agent;
      if (evt.job_id) currentJobId = evt.job_id;
      if (evt.status === 'starting'){
        if (activeAgent && activeAgent !== id){
          setAgentState(activeAgent, 'done', 'done');
        }
        activeAgent = id;
        setAgentState('orchestrator', 'active', 'routing → ' + id);
        if (id !== 'completed'){
          setAgentState(id, 'active', 'thinking…');
        }
        addFeedRow(id, evt.reasoning ? escapeHtml(evt.reasoning) : 'starting…');
      } else if (evt.status === 'completed'){
        setAgentState(id, 'done', 'done');
        if (typeof evt.budget_remaining === 'number'){
          statBudget.textContent = evt.budget_remaining.toLocaleString();
        }
        activeAgent = null;
      }
    } else if (evt.type === 'token'){
      answerText += evt.content;
      answerEl.innerHTML = escapeHtml(answerText) + '<span class="cursor"></span>';
    } else if (evt.type === 'done'){
      // handled by loop end
    }
  }
});

// ===== Evals modal =====
const modalBg = document.getElementById('modal-bg');
const modalContent = document.getElementById('modal-content');
modalBg.addEventListener('click', e => { if (e.target === modalBg) modalBg.classList.remove('show'); });

function openModal(html){
  modalContent.innerHTML = html;
  modalBg.classList.add('show');
}

document.getElementById('evals-btn').addEventListener('click', async () => {
  try{
    const r = await fetch('/api/v1/evals/latest');
    if (r.status === 404){
      openModal(`
        <h2>No evaluations yet</h2>
        <p class="sub">Run the eval suite to generate the first report.</p>
        <div class="row">
          <button class="pill" onclick="document.getElementById('modal-bg').classList.remove('show')">Close</button>
        </div>`);
      return;
    }
    const j = await r.json();
    const overall = (j.overall_score*100).toFixed(1);
    const catCards = Object.entries(j.category_scores || {}).map(([k,v]) => `
      <div class="score-card">
        <div class="lbl">${k}</div>
        <div class="val">${(v*100).toFixed(0)}<span style="font-size:13px;color:var(--text-2)">%</span></div>
      </div>`).join('') || '<div class="score-card"><div class="lbl">no categories</div></div>';
    const dimCards = Object.entries(j.dimension_scores || {}).map(([k,v]) => `
      <div class="score-card">
        <div class="lbl">${k}</div>
        <div class="val" style="color:var(--neon-cyan)">${(v*100).toFixed(0)}<span style="font-size:13px;color:var(--text-2)">%</span></div>
      </div>`).join('') || '<div class="score-card"><div class="lbl">no dimensions</div></div>';
    openModal(`
      <h2>Latest Evaluation</h2>
      <p class="sub">run: ${j.run_id}</p>
      <div class="overall">
        <div class="ring" style="--p:${overall}%">${overall}<span style="font-size:11px;color:var(--text-2)">%</span></div>
        <div>
          <div style="font-size:12px;color:var(--text-2);letter-spacing:1px;text-transform:uppercase;">Overall Quality</div>
          <div style="font-size:22px;font-weight:500;margin-top:4px;">across all test cases</div>
        </div>
      </div>
      <h3 style="font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-2);margin-bottom:10px;">Categories</h3>
      <div class="score-grid">${catCards}</div>
      <h3 style="font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-2);margin:18px 0 10px;">Dimensions</h3>
      <div class="score-grid">${dimCards}</div>
      <div class="row">
        <button class="pill" onclick="document.getElementById('modal-bg').classList.remove('show')">Close</button>
      </div>`);
  } catch(err){
    toast('Could not load evals: ' + err.message);
  }
});

document.getElementById('reeval-btn').addEventListener('click', async () => {
  try{
    toast('Triggering eval suite — this may take a moment…');
    const r = await fetch('/api/v1/evals/re_eval', { method:'POST' });
    if (!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    toast('Eval started · new_run_id=' + j.new_run_id.slice(0,8) + '…');
  } catch(err){
    toast('Could not start eval: ' + err.message);
  }
});
